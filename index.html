<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Vehicle Inspection</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #1a73e8; margin-top: 0; font-size: 1.2rem; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        input[type="file"] { display: block; width: 100%; margin-bottom: 10px; padding: 10px; border: 1px dashed #ccc; border-radius: 8px; cursor: pointer; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 10px; box-sizing: border-box; resize: vertical; }
        .submit-btn { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1rem; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Vehicle Inspection</h1>

    <div class="card">
        <h2>1. Exterior Bodywork</h2>
        <label>Photo: Dents & Scratches</label>
        <input type="file" accept="image/*" capture="environment">
        <textarea placeholder="Notes on body alignment/paint..."></textarea>
    </div>

    <div class="card">
        <h2>2. Tyres & Windscreen</h2>
        <label>Photo: Tread & Glass Condition</label>
        <input type="file" accept="image/*" capture="environment">
        <textarea placeholder="Notes on tyre depth or glass chips..."></textarea>
    </div>

    <div class="card">
        <h2>3. Interior & Dashboard</h2>
        <label>Photo: Dashboard (Engine On) & Seats</label>
        <input type="file" accept="image/*" capture="environment">
        <textarea placeholder="Notes on seat condition or warning lights..."></textarea>
    </div>

    <div class="card">
        <h2>4. Spare Wheel</h2>
        <label>Photo: Spare Tyre & Tools</label>
        <input type="file" accept="image/*" capture="environment">
    </div>

    <button class="submit-btn" onclick="alert('Inspection Data Captured!')">Complete Inspection</button>

</body>
</html>
